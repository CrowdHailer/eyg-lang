name: release

on:
  push:
    tags:
      - "gleam_cli-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gleam_cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.4"
          gleam-version: "1.15.3"

      - name: Build binaries and checksums
        run: |
          ./bin/compile bun-linux-x64    ./dist/eyg-linux-x64
          ./bin/compile bun-linux-arm64  ./dist/eyg-linux-arm64
          ./bin/compile bun-darwin-x64   ./dist/eyg-macos-x64
          ./bin/compile bun-darwin-arm64 ./dist/eyg-macos-arm64
          ./bin/compile bun-windows-x64  ./dist/eyg-windows-x64.exe
          cd dist && sha256sum eyg-* > SHA256SUMS

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#gleam_cli-}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gleam CLI ${{ steps.version.outputs.version }}"
          files: packages/gleam_cli/dist/*
