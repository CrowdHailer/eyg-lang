[workspace]
members = ["crates/eyg-ir"]

[package]
name = "rust-interpreter"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "eyg-run"
path = "src/main.rs"

[dependencies]
eyg-ir = { path = "crates/eyg-ir" }
base64 = "0.22.1"
clap = { version = "4.5.60", features = ["derive"] }
im = "15.1.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
unicode-segmentation = "1.12.0"
